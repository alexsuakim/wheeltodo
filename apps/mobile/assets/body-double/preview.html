<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Body Double — Layered Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      gap: 16px;
    }

    /* ── scene ── */
    .scene {
      position: relative;
      width: 680px;
      height: 383px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      flex-shrink: 0;
    }

    .layer {
      position: absolute;
      pointer-events: none;
    }

    /* Background fills the scene */
    #layerBg {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Character — positioned at desk on left side */
    #layerChar {
      bottom: 0;
      left: 2%;
      width: 46%;
      opacity: 1;
      transition: opacity 1.2s ease-in-out;
    }
    .char-frame {
      position: absolute;
      bottom: 0;
      left: 2%;
      width: 46%;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .char-frame.active { opacity: 1; }

    /* Cat — right side of desk */
    .cat-frame {
      position: absolute;
      bottom: 4%;
      left: 54%;
      width: 18%;
      opacity: 0;
      transition: opacity 0.12s ease-in-out;
    }
    .cat-frame.active { opacity: 1; }

    /* Steam */
    .steam {
      position: absolute;
      width: 52px;
      height: 52px;
      background-image: url('../steam_sprite.png');
      background-size: 156px 104px;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
      opacity: 0.7;
      /* position near mug — adjust with ☕ button */
      left: 20%;
      top: 52%;
      transform: translate(-50%, -100%);
    }

    /* Keypress sparks */
    .kb-zone {
      position: absolute;
      left: 10%;
      top: 70%;
      width: 28%;
      height: 8%;
      overflow: visible;
    }
    .keypress {
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,220,140,0.9);
      box-shadow: 0 0 5px 2px rgba(255,200,80,0.4);
      transform: translate(-50%,-50%);
      animation: keypop 0.32s ease-out forwards;
    }
    @keyframes keypop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
      25%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-60%) scale(0.5); }
    }

    /* Timer */
    .timer {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    /* Pose badge */
    .pose-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #c9935a;
    }

    /* Calibration crosshair */
    .scene.calibrating { outline: 2px dashed #c9935a; cursor: crosshair; }
    .calib-hint {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(201,147,90,0.9);
      color: #1a0e00;
      padding: 3px 9px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      display: none;
    }
    .scene.calibrating .calib-hint { display: block; }

    /* ── bottom bar ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.3s;
    }
    .dot.active { background: #c9935a; }

    .btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid #333;
      background: none;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn.on { color: #c9935a; border-color: #c9935a; }
    .coords { font-size: 11px; color: #444; min-width: 160px; }
  </style>
</head>
<body>

<div class="scene" id="scene" onclick="handleClick(event)">
  <img id="layerBg" class="layer" src="layers/bg.png" alt="">

  <!-- Character frames -->
  <img class="layer char-frame active" data-pose="typing"   src="layers/char_typing.png"   alt="">
  <img class="layer char-frame"        data-pose="writing"  src="layers/char_writing.png"  alt="">
  <img class="layer char-frame"        data-pose="drinking" src="layers/char_drinking.png" alt="">
  <img class="layer char-frame"        data-pose="window"   src="layers/char_window.png"   alt="">

  <!-- Cat frames -->
  <img class="layer cat-frame active" data-cat="open"   src="layers/cat_open.png"   alt="">
  <img class="layer cat-frame"        data-cat="half"   src="layers/cat_half.png"   alt="">
  <img class="layer cat-frame"        data-cat="closed" src="layers/cat_closed.png" alt="">

  <div class="steam" id="steam"></div>
  <div class="kb-zone" id="kbZone"></div>
  <div class="timer" id="timer">25:00</div>
  <div class="pose-badge" id="poseBadge">typing</div>
  <div class="calib-hint">Click to place ☕ steam</div>
</div>

<div class="bottom-bar">
  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <button class="btn" id="calibBtn" onclick="toggleCalib()">☕ move steam</button>
  <span class="coords" id="coords"></span>
</div>

<script>
  const POSES = [
    { name: 'typing',   dur: 14000 },
    { name: 'writing',  dur: 8000  },
    { name: 'drinking', dur: 5000  },
    { name: 'window',   dur: 9000  },
  ];
  const CAT_SEQ  = ['open','open','open','open','half','closed','half','open'];
  const STEAM_FR = ['0px 0px','-52px 0px','-104px 0px','0px -52px','-52px -52px','-104px -52px'];

  const scene    = document.getElementById('scene');
  const steamEl  = document.getElementById('steam');
  const kbZone   = document.getElementById('kbZone');
  const timerEl  = document.getElementById('timer');
  const badgeEl  = document.getElementById('poseBadge');
  const dotsEl   = document.getElementById('dots');
  const calibBtn = document.getElementById('calibBtn');
  const coordsEl = document.getElementById('coords');

  let poseIdx    = 0;
  let catIdx     = 0;
  let sfIdx      = 0;
  let secs       = 25 * 60;
  let calibMode  = false;
  let kpTimer    = null;

  // ── pose cycling ──
  function showPose(i) {
    document.querySelectorAll('.char-frame').forEach((el, j) =>
      el.classList.toggle('active', j === i));
    badgeEl.textContent = POSES[i].name;
    dotsEl.querySelectorAll('.dot').forEach((d, j) =>
      d.classList.toggle('active', j === i));

    clearInterval(kpTimer);
    if (POSES[i].name === 'typing') kpTimer = setInterval(spawnKey, 155);

    setTimeout(() => {
      poseIdx = (poseIdx + 1) % POSES.length;
      showPose(poseIdx);
    }, POSES[i].dur);
  }

  // ── cat blink ──
  function tickCat() {
    const state = CAT_SEQ[catIdx % CAT_SEQ.length];
    document.querySelectorAll('.cat-frame').forEach(el =>
      el.classList.toggle('active', el.dataset.cat === state));
    catIdx++;
  }

  // ── steam ──
  function tickSteam() {
    steamEl.style.backgroundPosition = STEAM_FR[sfIdx % 6];
    sfIdx++;
  }

  // ── keypress sparks ──
  function spawnKey() {
    const d = document.createElement('div');
    d.className = 'keypress';
    d.style.left = (Math.random() * 100) + '%';
    d.style.top  = (Math.random() * 100) + '%';
    kbZone.appendChild(d);
    setTimeout(() => d.remove(), 350);
  }

  // ── steam calibration ──
  function toggleCalib() {
    calibMode = !calibMode;
    scene.classList.toggle('calibrating', calibMode);
    calibBtn.classList.toggle('on', calibMode);
    if (!calibMode) coordsEl.textContent = '';
  }
  function handleClick(e) {
    if (!calibMode) return;
    const r = scene.getBoundingClientRect();
    const l = ((e.clientX - r.left) / r.width  * 100).toFixed(1);
    const t = ((e.clientY - r.top)  / r.height * 100).toFixed(1);
    steamEl.style.left = l + '%';
    steamEl.style.top  = t + '%';
    coordsEl.textContent = `steam: left ${l}%  top ${t}%`;
  }

  // ── timer ──
  setInterval(() => {
    if (secs > 0) secs--;
    timerEl.textContent =
      String(Math.floor(secs/60)).padStart(2,'0') + ':' +
      String(secs%60).padStart(2,'0');
  }, 1000);

  // ── start loops ──
  setInterval(tickSteam, 180);
  setInterval(tickCat, 400);  // cat blink sequence ticks every 400ms
  showPose(0);
</script>
</body>
</html>
